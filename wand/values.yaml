# These values are required and are unique per cluster/customer
# customerID: ""
# clusterID: ""

# URL override for possible private link
# urlOverride: ""


# If are using a differet method to insert secrets to the cluster make createSecret: false and add the following in your values:
# prometheus:
#   server:
#     extraSecretMounts:
#       - name: auth-file
#         mountPath: /etc/config/auth
#         secretName: <secretname>
fullnameOverride: wand

# Read-only mode disables all write operations for security-conscious environments
# When enabled, Wand will only monitor and analyze workloads without making modifications
readOnlyMode: false

# TLS certificate for the admission webhooks, issued by certgen.
webhookCert:
  secretName: "wand-webhook-tls"
  certGen:
    image:
      repository: public.ecr.aws/wand/kube-webhook-certgen
      tag: v20230312-helm-chart-4.5.2-28-g66a760794
      pullPolicy: Always
    resources: {}
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    nodeSelector: {}
    tolerations: []
    affinity: {}

auth:
  createSecret: true
  # Here is the authentication token required if createSecret is true
  # token: ""

cadvisor:
  kubelet:
    enabled: true

kubeStateMetrics:
  enabled: true
  prometheusScrape: false
  fullnameOverride: wand-kube-state-metrics
  nameOverride: wand-kube-state-metrics
  customLabels:
    wand.cloud/workload-is-controlled: "true"
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 1Gi
  metricAllowlist:
    - kube_pod_.*
    - kube_deployment_labels
    - kube_daemonset_labels
    - kube_statefulset_labels
    - kube_job_labels
    - kube_cronjob_labels
    - kube_.*_owner
    - kube_deployment_status_replicas_ready
    - kube_daemonset_status_number_ready
    - kube_statefulset_status_replicas_ready
    - kube_statefulset_status_replicas_ready
    - kube_cronjob_status_active
    - kube_node_.*
    - kube_deployment_annotations
    - kube_daemonset_annotations
    - kube_statefulset_annotations
    - kube_job_annotations
    - kube_cronjob_annotations
    - kube_horizontalpodautoscaler_.*
    - kube_poddisruptionbudget_.*
    - kube_resource.*
    - kube_limit.*
  metricLabelsAllowlist:
    - pods=[wand.cloud/workload-name,wand.cloud/workload-uid,wand.cloud/workload-kind,wand.cloud/mutated]
  extraArgs:
    - --metric-opt-in-list=kube_pod_nodeselectors
  collectors:
  - cronjobs
  - daemonsets
  - deployments
  - horizontalpodautoscalers
  - jobs
  - limitranges
  - nodes
  - persistentvolumeclaims
  - persistentvolumes
  - poddisruptionbudgets
  - pods
  - replicasets
  - replicationcontrollers
  - resourcequotas
  - statefulsets

nodeAgent:
  enabled: true
  tolerations:
    - operator: Exists
  fullnameOverride: wand-node-agent
  nameOverride: wand-node-agent
  commonLabels:
    wand.cloud/workload-is-controlled: "true"
  service:
    port: 9191
    targetPort: 9191
    annotations:
      prometheus.io/scrape: "false"
  resources:
    requests:
      cpu: 100m
    limits:
      memory: 100Mi
  extraArgs:
    - --web.telemetry-path=/wand-metrics
  metricsPath: /wand-metrics

prometheus:
  enabled: true
  commonMetaLabels:
    wand.cloud/workload-is-controlled: "true"
  rbac:
    create: false
  serviceAccounts:
    server:
      name: wand-prom-sa
  configmapReload:
    prometheus:
      resources:
        limits:
          memory: 50Mi
        requests:
          cpu: 10m
          memory: 30Mi
  server:
    fullnameOverride: wand-metrics-collector
    clusterRoleName: wand-prom
    replicaCount: 1
    strategy:
      type: RollingUpdate
    configMapOverrideName: prometheus-yaml
    persistentVolume:
      enabled: false
    resources:
      limits:
        memory: 8Gi
        ephemeral-storage: 5Gi
      requests:
        cpu: 2
        memory: 8Gi
        ephemeral-storage: 5Gi
    defaultFlagsOverride:
      - --agent
      - --storage.agent.retention.max-time=30m
      - --config.file=/etc/config/prometheus.yml
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/console
      - --web.enable-lifecycle
    extraSecretMounts:
      - name: auth-file
        mountPath: /etc/config/auth
        secretName: auth-file
  alertmanager:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  kube-state-metrics:
    enabled: false

mutator:
  enabled: true
  name: mutator
  replicas: 3
  image:
    repository: public.ecr.aws/wand/mutator
    tag: v1.14.1
    pullPolicy: Always
  wandControl: true
  debugLog: false
  resources:
    requests:
      cpu: 1
      memory: 1Gi
      ephemeral-storage: 100Mi
    limits:
      memory: 2Gi
      ephemeral-storage: 200Mi
  pdb:
    enabled: true
  extraEnvVars: {}

controller:
  enabled: true
  name: controller
  replicas: 1
  image:
    repository: public.ecr.aws/wand/controller
    tag: v1.20.0
    pullPolicy: Always
  wandControl: true
  debugLog: false
  resources:
    requests:
      cpu: 2
      memory: 8Gi
      ephemeral-storage: 400Mi
    limits:
      memory: 8Gi
      ephemeral-storage: 400Mi

workloadDefaults:
  config:
    All:
      controlled: false
      autoRollout: false
      cpuLimitBuffer: 20
      cpuLimitMinBuffer: "10m"
      enableInPlaceResize: true
      hardMaxCPU: "20"
      hardMaxMemory: "50Gi"
      memoryLimitBuffer: 25
      memoryLimitMinBuffer: "512Mi"
      oomRecovery: true
      setCpuLimits: false
      skipLearningPeriod: false
      workloadRuntimeBehavior: ""
      hpaBehavior: none
    Deployment:
      autoRollout: true
    Rollout:
      autoRollout: true
    GroupOfDeployments:
      autoRollout: true
    GroupOfRollouts:
      autoRollout: true