{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "controller.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ template "controller.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: {{ template "controller.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: webhook
      port: 9443
      targetPort: 9443
{{- end }}
