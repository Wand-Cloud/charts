{{ if .Values.controller.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "controller.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ template "controller.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{ if .Values.controller.wandControl -}}
    wand.cloud/workload-is-controlled: "true"
    {{- end }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ template "controller.fullname" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ template "controller.fullname" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{ if .Values.controller.nodeSelector -}}
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      {{- end }}
      {{ if .Values.controller.tolerations -}}
        tolerations:
        {{- toYaml .Values.controller.tolerations | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "controller.fullname" . }}
      containers:
        - name: controller
          image: {{ template "controller.image" . }}
          env:
            - name: API_USERNAME
              value: "{{ include "auth.username" . }}"
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: token
                  name: {{ include "auth.secretName" . }}
            - name: CUSTOMER_ID
              value: "{{ include "customerID" . }}"
            - name: CLUSTER_ID
              value: "{{ include "clusterID" . }}"
            - name: POD_ID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: MAIN_API_URL
              value: "{{ include "api.url" .}}"
            - name: DEBUG
              value: "{{ .Values.controller.debugLog }}"
            - name: MUTATOR_URL
              value: {{ template "mutator.fullname" . }}
            - name: CONFIG_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: WEBHOOK_SECRET_NAME
              value: {{ .Values.webhookCert.secretName | quote }}
            - name: CONTROLLER_SERVICE
              value: {{ include "controller.fullname" . | quote }}
            - name: VWC_NAME
              value: "wand-workload-defaults-protection"
            - name: READ_ONLY_MODE
              value: "{{ .Values.readOnlyMode }}"
            {{- range $key, $value := .Values.controller.extraEnvVars }}
            - name: "{{ $key }}"
              value: "{{ $value }}"
            {{- end }}
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: readiness
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          {{- if .Values.controller.resources }}
          resources:
          {{- .Values.controller.resources | toYaml | nindent 12 }}
          {{- end }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          volumeMounts:
            - name: tls-certs
              mountPath: "/etc/tls-certs"
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ .Values.webhookCert.secretName }}
            optional: true
            items:
            - key: cert
              path: tls.crt
            - key: key
              path: tls.key
{{- end }}
