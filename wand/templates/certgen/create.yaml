{{- if or .Values.controller.enabled (and .Values.mutator.enabled (not .Values.readOnlyMode)) }}
{{- $hosts := list }}
{{- $hosts = append $hosts (include "controller.fullname" .) }}
{{- $hosts = append $hosts (printf "%s.%s.svc" (include "controller.fullname" .) .Release.Namespace) }}
{{- $hosts = append $hosts (printf "%s.%s.svc.cluster.local" (include "controller.fullname" .) .Release.Namespace) }}
{{- $hosts = append $hosts (include "mutator.fullname" .) }}
{{- $hosts = append $hosts (printf "%s.%s.svc" (include "mutator.fullname" .) .Release.Namespace) }}
{{- $hosts = append $hosts (printf "%s.%s.svc.cluster.local" (include "mutator.fullname" .) .Release.Namespace) }}
apiVersion: batch/v1
kind: Job
metadata:
  name:  {{ include "wand.fullname" . }}-admission-certgen
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-110"
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
    "argocd.argoproj.io/sync-wave": "-2"
  labels:
    app.kubernetes.io/component: certgen
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      name: {{ include "wand.fullname" . }}-admission-certgen
      labels:
        app.kubernetes.io/component: admission-certgen
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "wand.fullname" . }}-admission-certgen
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: create
          image: {{ printf "%s:%s" .Values.webhookCert.certGen.image.repository .Values.webhookCert.certGen.image.tag }}
          imagePullPolicy: {{ .Values.webhookCert.certGen.image.pullPolicy }}
          args:
            - create
            - --host={{ join "," $hosts }}
            - --namespace={{ .Release.Namespace }}
            - --secret-name={{ .Values.webhookCert.secretName }}
          resources:
            {{- toYaml .Values.webhookCert.certGen.resources | nindent 12 }}
          {{- with .Values.webhookCert.certGen.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.webhookCert.certGen.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookCert.certGen.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookCert.certGen.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookCert.certGen.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
